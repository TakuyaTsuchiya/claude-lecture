<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>S2V3 Claude Designで資料を作る</title>
<link rel="stylesheet" href="../styles/slide.css">
</head>
<body>

<div class="deck">

  <!-- 1: Cover -->
  <section class="slide cover active">
    <h1>Claude Designで<br>資料を作る</h1>
  </section>

  <!-- 2: Claude Designとは -->
  <section class="slide">
    <div class="eyebrow">CLAUDE DESIGN</div>
    <h2>ノンデザイナー必見の<br>AIデザインツール</h2>
    <div style="font-size:20pt; color:var(--color-mute); margin-bottom:20px;">https://claude.ai/design</div>
    <div class="rule"></div>
    <div style="display:flex; gap:28px; max-width:1020px; width:100%;">
      <div style="flex:1; padding:28px 20px; background:var(--color-accent-soft); border-radius:12px; text-align:center;">
        <div style="font-size:20pt; color:var(--color-mute); margin-bottom:12px;">ターゲット</div>
        <div style="font-size:24pt; font-weight:700; line-height:1.5;">経営者・PM<br>マーケター<br><span style="font-weight:400; color:var(--color-sub); font-size:20pt;">ノンデザイナー向け</span></div>
      </div>
      <div style="flex:1; padding:28px 20px; background:var(--color-accent-soft); border-radius:12px; text-align:center;">
        <div style="font-size:20pt; color:var(--color-mute); margin-bottom:12px;">利用条件</div>
        <div style="font-size:24pt; font-weight:700; line-height:1.5;">Proプランから<br>利用可能</div>
      </div>
      <div style="flex:1; padding:28px 20px; background:var(--color-accent-soft); border-radius:12px; text-align:center;">
        <div style="font-size:20pt; color:var(--color-mute); margin-bottom:12px;">できること</div>
        <div style="font-size:24pt; font-weight:700; line-height:1.5;">LP・スライド<br>Webページ</div>
      </div>
    </div>
  </section>

  <!-- 3: Closing -->
  <section class="slide cover">
    <h1 style="font-size:60pt; line-height:1.5;">2〜3プロンプトで<br>実践レベルの資料</h1>
  </section>

</div>

<div class="page-indicator"><span id="cur">1</span> / <span id="total">1</span></div>
<div class="nav-hint">← → / Space</div>

<script src="../styles/slide.js"></script>
<script>
  const slides = document.querySelectorAll('.slide');
  const cur = document.getElementById('cur');
  const total = document.getElementById('total');
  total.textContent = slides.length;
  let i = 0;
  function show(n) {
    i = Math.max(0, Math.min(n, slides.length - 1));
    slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
    cur.textContent = i + 1;
    try { history.replaceState(null, '', '#' + (i + 1)); } catch (e) {}
  }
  const initial = parseInt(location.hash.replace('#', ''), 10);
  show(Number.isFinite(initial) && initial > 0 ? initial - 1 : 0);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); show(i + 1); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); show(i - 1); }
    else if (e.key === 'Home') { show(0); }
    else if (e.key === 'End') { show(slides.length - 1); }
  });
  document.addEventListener('click', () => show(i + 1));
</script>

</body>
</html>
