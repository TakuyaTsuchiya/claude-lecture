<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>S3V5 コネクタ　Googleドライブ連携　散らばった経営資料を横断して月次レポートを作ろう</title>
<link rel="stylesheet" href="../styles/slide.css">
</head>
<body>

<div class="deck">

  <!-- 1: Cover -->
  <section class="slide cover active">
    <h1>コネクタ<br>Googleドライブ連携</h1>
    <div class="subtitle" style="margin-top:24px;">散らばった経営資料を横断して<br>月次レポートを作ろう</div>
  </section>

  <!-- 2: コネクタとは -->
  <section class="slide">
    <div class="eyebrow">CONNECTOR</div>
    <h2>Anthropic公式の<br>外部連携窓口</h2>
    <div class="rule"></div>
    <div class="subtitle" style="margin-top:24px;">追加して有効化すると、Claude経由で操作が可能に。</div>
  </section>

  <!-- 3: 今日のお題 -->
  <section class="slide">
    <div class="eyebrow">TODAY'S TASK</div>
    <div class="subtitle" style="margin-top:24px;">Googleドライブに散らばった<br>数字・議事録・事業メモを<br>Claudeが横断して、レポートにする。</div>
  </section>

  <!-- 4: Closing -->
  <section class="slide cover">
    <h1 style="font-size:48pt;">Googleドライブまで<br>Claudeがデータを取得しにいく</h1>
  </section>

</div>

<div class="page-indicator"><span id="cur">1</span> / <span id="total">1</span></div>
<div class="nav-hint">← → / Space</div>

<script src="../styles/slide.js"></script>
<script>
  const slides = document.querySelectorAll('.slide');
  const cur = document.getElementById('cur');
  const total = document.getElementById('total');
  total.textContent = slides.length;
  let i = 0;
  function show(n) {
    i = Math.max(0, Math.min(n, slides.length - 1));
    slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
    cur.textContent = i + 1;
    try { history.replaceState(null, '', '#' + (i + 1)); } catch (e) {}
  }
  const initial = parseInt(location.hash.replace('#', ''), 10);
  show(Number.isFinite(initial) && initial > 0 ? initial - 1 : 0);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); show(i + 1); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); show(i - 1); }
    else if (e.key === 'Home') { show(0); }
    else if (e.key === 'End') { show(slides.length - 1); }
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('a')) show(i + 1);
  });
</script>
</body>
</html>
