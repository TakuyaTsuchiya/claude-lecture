<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>名刺管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-stone-50 text-stone-900 min-h-screen">

<div class="max-w-6xl mx-auto px-6 py-10">

  <header class="mb-8 flex items-center gap-3">
    <div class="w-2 h-8 rounded" style="background:#c15f3c"></div>
    <h1 class="text-2xl font-bold">名刺管理</h1>
  </header>

  <!-- ツーカラム本体 -->
  <div class="grid grid-cols-[340px_1fr] gap-6">

    <!-- 左ペイン: 一覧 -->
    <aside class="flex flex-col gap-3">
      <input
        type="text"
        id="search-input"
        placeholder="氏名・会社名・役職で検索"
        class="w-full px-4 py-3 rounded-lg border border-stone-200 bg-white focus:outline-none focus:border-stone-400 text-sm"
      >
      <button id="btn-new" class="w-full px-4 py-3 rounded-lg text-white font-semibold text-sm" style="background:#c15f3c">
        ＋ 新規登録
      </button>
      <div id="card-list" class="flex flex-col gap-2 overflow-y-auto" style="max-height:70vh"></div>
      <div id="empty-list" class="hidden text-center py-8 text-stone-500 text-sm">
        該当する名刺はありません
      </div>
    </aside>

    <!-- 右ペイン: 空/詳細/フォーム -->
    <main class="bg-white rounded-lg border border-stone-200 min-h-[480px] p-8">

      <!-- モード1: 空状態 -->
      <section id="pane-empty" class="pane h-full flex items-center justify-center text-stone-400 text-sm">
        左から名刺を選んでください
      </section>

      <!-- モード2: 詳細 -->
      <section id="pane-detail" class="pane hidden">
        <div class="flex justify-end gap-2 mb-6">
          <button id="btn-edit" class="px-4 py-2 rounded-lg border border-stone-200 bg-white hover:bg-stone-50 text-sm">編集</button>
          <button id="btn-delete" class="px-4 py-2 rounded-lg border border-red-200 text-red-600 bg-white hover:bg-red-50 text-sm">削除</button>
        </div>
        <div class="flex gap-4 items-start mb-8">
          <div class="w-1 h-16 rounded" style="background:#c15f3c"></div>
          <div>
            <div id="d-name" class="text-2xl font-bold mb-1"></div>
            <div id="d-company" class="text-stone-700"></div>
            <div id="d-title" class="text-stone-500 text-sm"></div>
          </div>
        </div>
        <dl class="grid grid-cols-[100px_1fr] gap-y-3 gap-x-4 text-sm">
          <dt class="text-stone-500">メール</dt>
          <dd id="d-email" class="break-all"></dd>
          <dt class="text-stone-500">電話</dt>
          <dd id="d-phone"></dd>
          <dt class="text-stone-500">メモ</dt>
          <dd id="d-memo" class="whitespace-pre-wrap"></dd>
          <dt class="text-stone-500">登録日</dt>
          <dd id="d-created" class="text-stone-500"></dd>
        </dl>
      </section>

      <!-- モード3: フォーム -->
      <section id="pane-form" class="pane hidden">
        <div class="flex items-center justify-between mb-6">
          <h2 id="form-title" class="text-lg font-semibold"></h2>
          <button id="btn-cancel" class="text-stone-600 hover:text-stone-900 text-sm">キャンセル</button>
        </div>
        <form id="form" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold mb-2">氏名 <span class="text-red-500">*</span></label>
            <input type="text" name="name" required class="w-full px-4 py-3 rounded-lg border border-stone-200 focus:outline-none focus:border-stone-400">
          </div>
          <div>
            <label class="block text-sm font-semibold mb-2">会社名 <span class="text-red-500">*</span></label>
            <input type="text" name="company" required class="w-full px-4 py-3 rounded-lg border border-stone-200 focus:outline-none focus:border-stone-400">
          </div>
          <div>
            <label class="block text-sm font-semibold mb-2">役職</label>
            <input type="text" name="title" class="w-full px-4 py-3 rounded-lg border border-stone-200 focus:outline-none focus:border-stone-400">
          </div>
          <div class="grid grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-semibold mb-2">メール</label>
              <input type="email" name="email" class="w-full px-4 py-3 rounded-lg border border-stone-200 focus:outline-none focus:border-stone-400">
            </div>
            <div>
              <label class="block text-sm font-semibold mb-2">電話</label>
              <input type="tel" name="phone" class="w-full px-4 py-3 rounded-lg border border-stone-200 focus:outline-none focus:border-stone-400">
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold mb-2">メモ</label>
            <textarea name="memo" rows="4" class="w-full px-4 py-3 rounded-lg border border-stone-200 focus:outline-none focus:border-stone-400 resize-none"></textarea>
          </div>
          <div class="pt-2">
            <button type="submit" class="w-full py-3 rounded-lg text-white font-semibold" style="background:#c15f3c">保存</button>
          </div>
        </form>
      </section>

    </main>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
