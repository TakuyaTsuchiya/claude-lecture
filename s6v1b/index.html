<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>S6V1B Vercel環境変数を Sensitive（機密情報）機能で守る</title>
<link rel="stylesheet" href="../styles/slide.css">
</head>
<body>

<div class="deck">

  <!-- 1: Cover -->
  <section class="slide cover active">
    <h1 style="font-size:54pt; line-height:1.4;">Vercel環境変数を<br><span style="color:var(--color-accent);">Sensitive（機密情報）</span><br>機能で守る</h1>
  </section>

  <!-- 2: 鍵の漏えいは現実に起きる -->
  <section class="slide">
    <div class="eyebrow">WHY</div>
    <h2>鍵の漏えいは現実に起きる</h2>
    <div class="rule"></div>
    <div style="display:flex; gap:48px; max-width:1240px; margin:24px auto 0; align-items:center; width:100%;">
      <!-- Left: bullets -->
      <div style="flex:1;">
        <ul style="font-size:22pt; line-height:2; text-align:left; list-style:disc; padding-left:32px; margin:0; color:var(--color-text);">
          <li>2026年4月、Vercelで事故が発生</li>
          <li><span style="color:var(--color-accent); font-weight:700;">Sensitive をオンにしていなかった</span><br>環境変数のみ露出</li>
          <li><span style="color:var(--color-accent); font-weight:700;">Sensitive ON</span> の鍵は守られた</li>
        </ul>
        <div style="font-size:20pt; line-height:1.6; color:var(--color-text); margin-top:28px; padding-left:32px; font-weight:500; text-align:left;">
          最初から Sensitive にしておけば、<br>防げた事故。
        </div>
      </div>
      <!-- Right: Vercel UI screenshot -->
      <div style="flex:1; display:flex; flex-direction:column; align-items:center;">
        <div style="font-size:18pt; color:var(--color-sub); letter-spacing:0.15em; font-weight:700; margin-bottom:8px;">Environment Variables 画面</div>
        <img src="../assets/vercel-sensitive-toggle-cropped.png" alt="Vercel環境変数のSensitiveトグル" style="width:100%; max-width:480px; max-height:440px; object-fit:contain; border:1px solid var(--color-line); border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,0.12);">
      </div>
    </div>
    <div style="margin-top:12px; font-size:16pt; color:var(--color-sub); text-align:center;">
      <span style="font-size:12pt;">出典: vercel.com/kb/bulletin/vercel-april-2026-security-incident</span>
    </div>
  </section>

</div>

<div class="page-indicator"><span id="cur">1</span> / <span id="total">1</span></div>
<div class="nav-hint">← → / Space</div>

<script src="../styles/slide.js"></script>
<script>
  const slides = document.querySelectorAll('.slide');
  const cur = document.getElementById('cur');
  const total = document.getElementById('total');
  total.textContent = slides.length;
  let i = 0;
  function show(n) {
    i = Math.max(0, Math.min(n, slides.length - 1));
    slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
    cur.textContent = i + 1;
    try { history.replaceState(null, '', '#' + (i + 1)); } catch (e) {}
  }
  const initial = parseInt(location.hash.replace('#', ''), 10);
  show(Number.isFinite(initial) && initial > 0 ? initial - 1 : 0);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); show(i + 1); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); show(i - 1); }
    else if (e.key === 'Home') { show(0); }
    else if (e.key === 'End') { show(slides.length - 1); }
  });
  document.addEventListener('click', () => show(i + 1));
</script>

</body>
</html>
