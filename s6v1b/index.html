<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>S6V1B Vercel環境変数を Sensitive で守る</title>
<link rel="stylesheet" href="../styles/slide.css">
</head>
<body>

<div class="deck">

  <!-- 1: Cover -->
  <section class="slide cover active">
    <h1 style="font-size:64pt;">Vercel環境変数を<br><span style="color:var(--color-accent);">Sensitive</span> で守る</h1>
  </section>

  <!-- 2: 鍵の漏えいは現実に起きる -->
  <section class="slide">
    <div class="eyebrow">WHY</div>
    <h2>鍵の漏えいは現実に起きる</h2>
    <div class="rule"></div>
    <div style="display:flex; align-items:stretch; justify-content:center; gap:28px; margin-top:32px; width:100%; max-width:1200px;">
      <div style="flex:1; border:2px solid var(--color-line); border-radius:12px; padding:28px 22px; background:#fafafa; text-align:center;">
        <div style="font-size:18pt; color:var(--color-sub); letter-spacing:0.2em; font-weight:700; margin-bottom:18px;">2026年4月の事故</div>
        <div style="font-size:22pt; line-height:1.7; color:var(--color-text); font-weight:500;"><span style="color:var(--color-accent);">Sensitiveでない</span><br>環境変数が外部に露出</div>
        <div style="margin-top:16px; font-size:18pt; line-height:1.7; color:var(--color-sub);">従業員アカウントの侵害<br>から拡大</div>
      </div>
      <div style="display:flex; align-items:center; justify-content:center; min-width:80px;">
        <div style="font-size:48pt; color:var(--color-accent); font-weight:700;">→</div>
      </div>
      <div style="flex:1; border:2px solid var(--color-accent); border-radius:12px; padding:28px 22px; background:#fafafa; text-align:center;">
        <div style="font-size:18pt; color:var(--color-accent); letter-spacing:0.2em; font-weight:700; margin-bottom:18px;">Sensitive ON なら</div>
        <div style="font-size:22pt; line-height:1.7; color:var(--color-text); font-weight:500;">暗号化されて保管<br>値は読み戻せない</div>
        <div style="margin-top:16px; font-size:18pt; line-height:1.7; color:var(--color-sub);">この事故でも<br>守られた</div>
      </div>
    </div>
    <div style="margin-top:28px; font-size:18pt; color:var(--color-text); text-align:center;">
      最初から Sensitive にしておけば、防げた事故。
    </div>
    <div style="margin-top:14px; font-size:16pt; color:var(--color-sub); text-align:center;">
      <span style="font-size:12pt;">出典: vercel.com/kb/bulletin/vercel-april-2026-security-incident</span>
    </div>
  </section>

</div>

<div class="page-indicator"><span id="cur">1</span> / <span id="total">1</span></div>
<div class="nav-hint">← → / Space</div>

<script src="../styles/slide.js"></script>
<script>
  const slides = document.querySelectorAll('.slide');
  const cur = document.getElementById('cur');
  const total = document.getElementById('total');
  total.textContent = slides.length;
  let i = 0;
  function show(n) {
    i = Math.max(0, Math.min(n, slides.length - 1));
    slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
    cur.textContent = i + 1;
    try { history.replaceState(null, '', '#' + (i + 1)); } catch (e) {}
  }
  const initial = parseInt(location.hash.replace('#', ''), 10);
  show(Number.isFinite(initial) && initial > 0 ? initial - 1 : 0);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); show(i + 1); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); show(i - 1); }
    else if (e.key === 'Home') { show(0); }
    else if (e.key === 'End') { show(slides.length - 1); }
  });
  document.addEventListener('click', () => show(i + 1));
</script>

</body>
</html>
