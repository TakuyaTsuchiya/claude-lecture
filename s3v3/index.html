<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>S3V3 MCP①Slack連携　チャンネル横断で日報・週報を自動生成しよう</title>
<link rel="stylesheet" href="../styles/slide.css">
</head>
<body>

<div class="deck">

  <!-- 1: Cover -->
  <section class="slide cover active">
    <h1 style="font-size:60pt;">MCP①Slack連携<br>チャンネル横断で<br>日報・週報を自動生成しよう</h1>
  </section>

  <!-- 2: MCPとは -->
  <section class="slide">
    <div class="eyebrow">MODEL CONTEXT PROTOCOL</div>
    <h2>AIが外部ツールと<br>連携するための規格</h2>
    <div class="rule"></div>
    <img src="../assets/mcp-architecture.png" style="max-width:960px; max-height:420px; object-fit:contain; margin-top:8px;" alt="MCP architecture diagram">
    <div style="font-size:12pt; color:var(--color-mute); margin-top:12px;">出典: modelcontextprotocol.io</div>
  </section>

  <!-- 3: Closing -->
  <section class="slide cover">
    <h1>AIの目と手が<br>外部ツールに届く</h1>
    <div class="rule"></div>
    <div class="subtitle" style="font-size:22pt; white-space:nowrap;">Slack、Notion、MCPで接続したものはすべて、Claudeが操作できる。</div>
  </section>

</div>

<div class="page-indicator"><span id="cur">1</span> / <span id="total">1</span></div>
<div class="nav-hint">← → / Space</div>

<script src="../styles/slide.js"></script>
<script>
  const slides = document.querySelectorAll('.slide');
  const cur = document.getElementById('cur');
  const total = document.getElementById('total');
  total.textContent = slides.length;
  let i = 0;
  function show(n) {
    i = Math.max(0, Math.min(n, slides.length - 1));
    slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
    cur.textContent = i + 1;
    try { history.replaceState(null, '', '#' + (i + 1)); } catch (e) {}
  }
  const initial = parseInt(location.hash.replace('#', ''), 10);
  show(Number.isFinite(initial) && initial > 0 ? initial - 1 : 0);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); show(i + 1); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); show(i - 1); }
    else if (e.key === 'Home') { show(0); }
    else if (e.key === 'End') { show(slides.length - 1); }
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('a')) show(i + 1);
  });
</script>
</body>
</html>
