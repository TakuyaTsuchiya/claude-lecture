<div class="deck">

  <!-- 1: Cover -->

      <svg width="24" height="25" viewBox="0 0 109 113" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M63.7076 110.284C60.8481 113.885 55.0502 111.912 54.9813 107.314L53.9738 40.0627L99.1935 40.0627C107.384 40.0627 111.952 49.5228 106.859 55.9374L63.7076 110.284Z" fill="url(#sbp0)"/>
        <path d="M63.7076 110.284C60.8481 113.885 55.0502 111.912 54.9813 107.314L53.9738 40.0627L99.1935 40.0627C107.384 40.0627 111.952 49.5228 106.859 55.9374L63.7076 110.284Z" fill="url(#sbp1)" fill-opacity="0.2"/>
        <path d="M45.317 2.07103C48.1765 -1.53037 53.9745 0.442937 54.0434 5.04075L54.4849 72.2922H9.83113C1.64038 72.2922 -2.92775 62.8321 2.1655 56.4175L45.317 2.07103Z" fill="#3ECF8E"/>
        <defs>
          <linearGradient id="sbp0" x1="53.9738" y1="54.974" x2="94.1635" y2="71.8295" gradientUnits="userSpaceOnUse">

</div>

<div class="page-indicator"><span id="cur">1</span> / <span id="total">1</span></div>
<div class="nav-hint">← → / Space</div>

<script src="../styles/slide.js"></script>
<script>
  const slides = document.querySelectorAll('.slide');
  const cur = document.getElementById('cur');
  const total = document.getElementById('total');
  total.textContent = slides.length;
  let i = 0;
  function show(n) {
    i = Math.max(0, Math.min(n, slides.length - 1));
    slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
    cur.textContent = i + 1;
    try { history.replaceState(null, '', '#' + (i + 1)); } catch (e) {}
  }
  const initial = parseInt(location.hash.replace('#', ''), 10);
  show(Number.isFinite(initial) && initial > 0 ? initial - 1 : 0);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); show(i + 1); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); show(i - 1); }
    else if (e.key === 'Home') { show(0); }
    else if (e.key === 'End') { show(slides.length - 1); }
  });
  document.addEventListener('click', () => show(i + 1));
</script>

</body>
</html>
