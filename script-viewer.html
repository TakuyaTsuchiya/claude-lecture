<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>台本ビューア</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="styles/slide.css">
<style>
  body {
    overflow: auto;
    background: #f9f9f9;
  }
  .page {
    max-width: 1365px;
    margin: 0 auto;
    padding: 60px 40px 120px;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
  }
  .back-btn {
    font-size: 15pt;
    color: var(--color-accent);
    text-decoration: none;
    font-weight: 700;
  }
  .back-btn:hover { opacity: 0.7; }
  .script-title {
    font-size: 22pt;
    font-weight: 700;
    color: var(--color-text);
    flex: 1;
  }

  .content {
    background: #fff;
    border: 1px solid var(--color-line);
    border-radius: 10px;
    padding: 48px 56px;
    font-size: 19pt;
    line-height: 2;
    color: var(--color-text);
  }
  .content ul, .content ol { margin: 8px 0 8px 32px; }
  .content li { margin: 4px 0; }
  .content hr { border: none; border-top: 1px solid var(--color-line); margin: 32px 0; }
  .content strong { color: var(--color-text); }
  .content a { color: var(--color-accent); }
  .content code {
    font-family: var(--font-mono);
    background: var(--color-accent-soft);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 16pt;
  }

  /* 2-column scene layout */
  .scene-row {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 24px 48px;
    padding: 32px 0;
    border-top: 2px solid var(--color-line);
  }
  .scene-label {
    font-size: 14pt;
    font-weight: 700;
    color: var(--color-accent);
    line-height: 1.6;
    padding-top: 4px;
    word-break: break-all;
  }
  .scene-body {
    font-size: 19pt;
    line-height: 2;
    color: var(--color-text);
  }
  .scene-body p { margin: 12px 0; }
  .scene-body p:first-child { margin-top: 0; }
  .scene-body p.stage { color: #2e7d32; }
  .scene-body strong { color: var(--color-text); }
  .scene-body blockquote {
    border-left: 4px solid var(--color-accent);
    padding: 12px 24px;
    color: var(--color-sub);
    margin: 16px 0;
    background: var(--color-accent-soft);
    border-radius: 0 6px 6px 0;
    font-size: 15pt;
    line-height: 1.7;
  }
  .scene-body code {
    font-family: var(--font-mono);
    background: var(--color-accent-soft);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 16pt;
  }
  .scene-body pre {
    font-family: var(--font-mono);
    background: var(--color-accent-soft);
    padding: 20px 24px;
    border-radius: 6px;
    font-size: 15pt;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-all;
  }

  #error {
    color: #c00;
    font-size: 18pt;
    padding: 40px;
    text-align: center;
  }

  @media (max-width: 768px) {
    .page { padding: 28px 16px 80px; }
    .script-title { font-size: 18pt; }
    .content { padding: 24px 20px; }
    .scene-row { grid-template-columns: 1fr; gap: 6px 0; padding: 24px 0; }
    .scene-label { font-size: 12pt; word-break: normal; }
    .scene-body { font-size: 16pt; line-height: 1.8; }
    .scene-body code, .content code { font-size: 13pt; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="toolbar">
    <a class="back-btn" href="index.html">← 一覧へ</a>
    <div class="script-title" id="title">台本</div>
  </div>
  <div class="content" id="content"><p style="color:var(--color-mute)">読み込み中…</p></div>
  <div id="error" style="display:none"></div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const src = params.get('src');

  function twoColumnize(container) {
    // H1 をツールバーに移して削除
    const h1 = container.querySelector('h1');
    if (h1) {
      document.getElementById('title').textContent = h1.textContent;
      document.title = h1.textContent;
      h1.remove();
    }

    const kids = Array.from(container.children);
    const firstH2Idx = kids.findIndex(el => el.tagName === 'H2');
    if (firstH2Idx === -1) return;

    // H2 ごとにシーンをグループ化
    const scenes = [];
    let cur = null;
    for (let i = firstH2Idx; i < kids.length; i++) {
      const el = kids[i];
      if (el.tagName === 'H2') {
        if (cur) scenes.push(cur);
        cur = { label: el.textContent, body: [] };
      } else if (cur && el.tagName !== 'HR') {
        cur.body.push(el.cloneNode(true));
      }
    }
    if (cur) scenes.push(cur);

    // firstH2Idx 以降を削除
    for (let i = kids.length - 1; i >= firstH2Idx; i--) {
      container.removeChild(kids[i]);
    }

    // 2カラム行を生成して追加
    const area = document.createElement('div');
    area.className = 'scene-area';

    for (const scene of scenes) {
      const row = document.createElement('div');
      row.className = 'scene-row';

      const labelEl = document.createElement('div');
      labelEl.className = 'scene-label';
      labelEl.textContent = scene.label;

      const bodyEl = document.createElement('div');
      bodyEl.className = 'scene-body';
      scene.body.forEach(el => {
        // ト書き判定：「（」で始まり「）」で終わる段落を緑色にする
        if (el.tagName === 'P') {
          const text = el.textContent.trim();
          if (text.startsWith('（') && text.endsWith('）')) {
            el.classList.add('stage');
          }
        }
        bodyEl.appendChild(el);
      });

      row.appendChild(labelEl);
      row.appendChild(bodyEl);
      area.appendChild(row);
    }

    container.appendChild(area);
  }

  if (!src) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'src パラメータがありません';
    document.getElementById('content').style.display = 'none';
  } else {
    fetch(src)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(md => {
        const nameMatch = src.match(/([^/]+)\/script\.md$/);
        if (nameMatch) {
          document.getElementById('title').textContent = nameMatch[1].toUpperCase() + ' 台本';
          document.title = document.getElementById('title').textContent;
        }
        const container = document.getElementById('content');
        container.innerHTML = marked.parse(md);
        twoColumnize(container);
      })
      .catch(() => {
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'ファイルを読み込めませんでした: ' + src;
        document.getElementById('content').style.display = 'none';
      });
  }
</script>
</body>
</html>
